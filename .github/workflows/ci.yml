name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      TampCoreMode: package
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_BUILD_LABEL: tamp-helm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The Helm v3 CLI is a single binary. Installed per OS, pinned to a
      # specific version so CI is reproducible — bump deliberately in PRs.
      - name: Install Helm CLI (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod +x get_helm.sh
          DESIRED_VERSION=v3.16.2 ./get_helm.sh
          helm version --short

      - name: Install Helm CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install kubernetes-helm --version=3.16.2 --no-progress -y
          helm version --short

      - name: Install supported .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Verify SDKs
        shell: bash
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Tamp.Helm.slnx

      - name: Build
        run: dotnet build Tamp.Helm.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Tamp.Helm.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/**/*.trx
          if-no-files-found: warn
